# Continuous Delivery (CD) Pipeline
# Runs as a separate workflow after CI passes on protected branches.
# Builds release APK and AAB artifacts.

name: Continuous Delivery

on:
  push:
    branches:
      - main
      - staging
      - develop

jobs:
  wait-for-ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Wait for CI to pass
        uses: lewagon/wait-on-check-action@ccfb013c15c8afb7bf2b7c028fb74dc5a068cccc # v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: 'analyze'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 20
          allowed-conclusions: success

      - name: Wait for CI tests
        uses: lewagon/wait-on-check-action@ccfb013c15c8afb7bf2b7c028fb74dc5a068cccc # v1.3.4
        with:
          ref: ${{ github.sha }}
          check-regexp: '^test '
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 20
          allowed-conclusions: success

  determine-env:
    needs: wait-for-ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      app_env: ${{ steps.determine.outputs.app_env }}
    steps:
      - name: Determine environment from branch
        id: determine
        run: |
          case "${GITHUB_REF_NAME}" in
            main)
              echo "app_env=main" >> "$GITHUB_OUTPUT"
              ;;
            staging)
              echo "app_env=staging" >> "$GITHUB_OUTPUT"
              ;;
            develop)
              echo "app_env=dev" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unknown branch: ${GITHUB_REF_NAME}"
              exit 1
              ;;
          esac

  build-apk:
    needs: determine-env
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build APK (${{ needs.determine-env.outputs.app_env }})
        env:
          WEATHER_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: >-
          flutter build apk --release
          --build-name=1.0.0
          --build-number=${{ github.run_number }}
          --dart-define=APP_ENV=${{ needs.determine-env.outputs.app_env }}
          --dart-define=OPENWEATHER_API_KEY=$WEATHER_KEY

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: apk-${{ needs.determine-env.outputs.app_env }}-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  build-aab:
    needs: determine-env
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build AAB (${{ needs.determine-env.outputs.app_env }})
        env:
          WEATHER_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: >-
          flutter build appbundle --release
          --build-name=1.0.0
          --build-number=${{ github.run_number }}
          --dart-define=APP_ENV=${{ needs.determine-env.outputs.app_env }}
          --dart-define=OPENWEATHER_API_KEY=$WEATHER_KEY

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: aab-${{ needs.determine-env.outputs.app_env }}-${{ github.run_number }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
