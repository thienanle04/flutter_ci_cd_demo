# Tag-triggered release: push a semver tag like v1.2.3.
# - build-name comes from the tag (without leading v).
# - build-number uses github.run_number (monotonic per workflow in the repo).
# - APP_ENV is `main` for store-style production artifacts.

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: main
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Parse version from tag
        id: version
        shell: bash
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "Building release ${version} (build ${{ github.run_number }})"
      - name: Build release APK
        env:
          WEATHER_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: >-
          flutter build apk --release
          --build-name=${{ steps.version.outputs.version }}
          --build-number=${{ github.run_number }}
          --dart-define=APP_ENV=main
          --dart-define=OPENWEATHER_API_KEY=$WEATHER_KEY
      - uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
