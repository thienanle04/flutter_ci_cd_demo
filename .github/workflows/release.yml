# Tag-triggered release: push a semver tag like v1.2.3.
# - build-name comes from the tag (without leading v).
# - build-number uses github.run_number (monotonic per workflow in the repo).
# - APP_ENV is `main` for store-style production artifacts.

name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-rc*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: ${{ contains(github.ref, '-rc') && 'staging' || 'main' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Parse version from tag
        id: version
        shell: bash
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"
          if [[ "$tag" == *"-rc"* ]]; then
            echo "is_rc=true" >> "${GITHUB_OUTPUT}"
            echo "app_env=staging" >> "${GITHUB_OUTPUT}"
          else
            echo "is_rc=false" >> "${GITHUB_OUTPUT}"
            echo "app_env=main" >> "${GITHUB_OUTPUT}"
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "Building release ${version} (build ${{ github.run_number }})"
      - name: Build release APK
        env:
          WEATHER_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: >-
          flutter build apk --release
          --build-name=${{ steps.version.outputs.version }}
          --build-number=${{ github.run_number }}
          --dart-define=APP_ENV=main
          --dart-define=OPENWEATHER_API_KEY=$WEATHER_KEY
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-tag-${{ steps.version.outputs.version }}
          path: build/app/outputs/flutter-apk/app-release.apk
      - name: Create GitHub Release
        if: steps.version.outputs.is_rc == 'false'
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
          tag_name: v${{ steps.version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
